<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>f1 s1_VSWR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles.css" rel="stylesheet" />
    <link href="//fonts.googleapis.com/css?family=Raleway:400,300,600" 
      rel="stylesheet" type="text/css">

 <!-- CSS–– -->
 <link rel="stylesheet" type="text/css" href="css/normalize.css" >
 <link rel="stylesheet" type="text/css" href="css/skeleton.css" >

 <!-- Favicon -->
 <link rel="icon" type="image/png" href="images/favicon.png">
    <style>
      body {
        width: 96%;
        margin: 2% auto;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        border: 1px solid #ddd;
        font-size: 1.25rem;
        letter-spacing: 1px;
      }
      caption{
        caption-side: top ;
        padding:10px;
        font-weight:bold;
      }
      thead, tfoot {
        background-color: rgb(228, 240,245);
      }
      th {
        border: 1px solid #ddd;
        padding:8px 10px;
        height: 2.5rem;
        text-align: center;
      }
      td {
        border: 1px solid #ddd;
        padding: 8px 0;
        height: 2.5rem;
        text-align: center;
      }
      td:last-of-type {
        text-align: center;
      }
      tbody tr:nth-child(even) {
        background-color: rgb(248, 248, 248);
      }
      td input {
        min-width: 96%;
        box-sizing: border-box;
        border: none;
        border:0;
        padding: 4px;
        /* height: 100% */
      }

td  input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
td  input[type=number] {
  -moz-appearance: textfield;
  /* appearance:; */
}
      
    </style>
    <!-- <link rel="stylesheet" href="styles.css"> -->
</head>
<body>
    <div class="container">
        <h5> fn_lr_delta:s1</h5>
        <form id="vswrForm">
          <div class="row">
            <div class="six columns inline_inputs" >
              <label for="generator" style="font-weight: bold;">generator Impedance (Ω):</label>
              <input type="number" 
                id="generatorR" 
                step="any" required>
            </div>
            <div class="six columns inline_inputs">
              <label for="frequency_n" style="font-weight: bold;">number of frequencies</label>
              <input type="number" 
                min="1" 
                id="frequency_n" 
                step="1" required >
            </div>
          </div>
            <br>
          <button 
            id="button_f_n_table"
            class="button-primary">load the Table
          </button>
            <table id="mytable">
              <caption>frequency and load impedance</caption>
              <thead>
                <tr >
                  <th scope="col">frequency(MHz)</th>
                  <th scope="col">Load real R(Ω)</th>
                  <th scope="col">Load imag X(Ω)</th>
                </tr>
              </thead>
              <tbody id="frequencyTableBody">
              </tbody>
            </table>
            <br>
            <br>
            <!-- <p>stage number 1</p> -->
            <label >line1 is ended by short circuit; to eliminate it enter impedance 10000 or more;</label>
            <label>line2 is ended by complex Impedance</label>   
            <br>
            <div class="app_diagram_wrapper">
              <canvas id="structure1" width="800" height="260"></canvas>
            </div>
            <div class="row">
              <div class="six columns inline_inputs">
                <label for="table_n" style="font-weight:bold;">t_n</label>
                <input type="number" 
                    min="1" max="10"
                    id="table_n"
                    step="1" required >
              </div>
              <div class="six columns inline_inputs">
                <button id="" class="button-primary">load stages</button>
                  
              </div>
            </div>
            <table id="stagesTable">
              <caption>stage1 line parameters</caption>
              <thead>
                <tr >
                  <th scope="col" rowspan="2" class="vertical">stages</th>
                  <th scope="col" rowspan="2" class="vertical">lines</th>
                  <th scope="col" colspan="2">impedance (Ω)</th>
                  <th scope="col" colspan="2">length (mm)</th>
                </tr>
                <tr>
                  <th scope="col">min</th>
                  <th scope="col">max</th>
                  <th scope="col">min</th>
                  <th scope="col">max</th>
                </tr>
              </thead>
              <tbody id="stagesTableBody">
                <!-- Rows will be dynamically added here -->
                <tr>
                  <td rowspan="2">1</td>
                  <td>1</td>
                  <td><input type="number" onwheel="this.blur()"
                    id="Rmin11" step="any" required> </td>
                  <td><input type="number" onwheel="this.blur()"
                    id="Rmax11" step="any" required> </td>
                  <td><input type="number" onwheel="this.blur()"
                    id="Lmin11" step="any" required> </td>
                  <td><input type="number" onwheel="this.blur()"
                    id="Lmax11" step="any" required> </td>
                </tr>
                <tr>
                  <td>2</td>
                  <td><input type="number" onwheel="this.blur()"
                    id="Rmin12" step="any" required> </td>
                  <td><input type="number" onwheel="this.blur()"
                    id="Rmax12" step="any" required> </td>
                  <td><input type="number" onwheel="this.blur()"
                    id="Lmin12" step="any" required> </td>
                  <td><input type="number" onwheel="this.blur()"
                    id="Lmax12" step="any" required> </td>
                </tr>
                <tr>
                  <td rowspan="2">2</td>
                  <td>1</td>
                  <td><input type="number" id="Rmin21" step="any" required> </td>
                  <td><input type="number" id="Rmax21" step="any" required> </td>
                  <td><input type="number" id="Lmin21" step="any" required> </td>
                  <td><input type="number" id="Lmax21" step="any" required> </td>
                </tr>
                <tr>
                  <td>2</td>
                  <td><input type="number" id="Rmin22" step="any" required> </td>
                  <td><input type="number" id="Rmax22" step="any" required> </td>
                  <td><input type="number" id="Lmin22" step="any" required> </td>
                  <td><input type="number" id="Lmax22" step="any" required> </td>
                </tr>
              </tbody>
            </table>
            <!-- <div class="row">
              <div class="six columns inline_inputs">
                <label for="line1_R">line1 impedance (Ω)</label>
                <input type="number" id="line1_R" 
                  style="padding-left:0.5rem;"
                  step="any" required>
              </div>
              <div class="six columns inline_inputs">
                <label for="line1_L">line1 length (mm)</label>
                <input type="number" style="padding-left:0.5rem;"
                  id="line1_L" 
                  step="any" required>
              </div>
            </div>
            <div class="row">
              <div class="six columns inline_inputs">
                <label for="line2_R">line2 impedance (Ω)</label>
                <input type="number" style="padding-left:0.5rem;"
                  id="line2_R" 
                  step="any" required>
                
              </div>
              <div class="six columns inline_inputs">
                <label for="line2_L">line2 length (mm)</label>
                <input type="number" style="padding-left:0.5rem;"
                  id="line2_L" 
                  step="any" required>
              </div>
            </div> -->
            <br>
            <button class="button-primary" style="margin-top: .1rem;"
              type="submit">calculate</button>
        </form>
        <br>
        <fieldset>
          <legend>results</legend>
          <!-- <div id="result">Input Impedance:</div> -->
          <div id="result_vswr"></div>

          <div id="statusIndicator" 
             class="status-indicator">Ready to Input</div>
         
        </fieldset>
        
        <br>
        <div id="result_zin" class="inline_inputs">
          <label for="explanation" style="font-weight: bold;">Zin or error</label>
          <textarea id="explanation" 
             rows="7"
             cols="71"
             minheight="10rem"
             readonly></textarea>
        </div>
    </div>
    <script type="module" src="parallel_vswr.js"></script>
    <script type="module" src="timenow.js"></script>
    <script type="module" src="calculateVSWR.js"></script>
    <script type="module" src="parallel_zin.js"></script>
    <script type="module" src="mycanvas.js"></script>

</body>
</html>
